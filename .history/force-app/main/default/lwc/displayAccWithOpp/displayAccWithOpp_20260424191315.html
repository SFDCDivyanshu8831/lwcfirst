<template>
    <template lwc:if={isRecordAvailable}>

        <div style="height: 300px;">
        <lightning-datatable
                key-field="id"
                data={accounts.data}
                columns={columns}
                hide-checkbox-column="true"
                show-row-number-column="true"
                onrowaction={handleRowAction}>
        </lightning-datatable>
    </div>

    </template>

    <template lwc:else>

        <p>No Accounts Available for logged in User</p>

    </template>
</template>
